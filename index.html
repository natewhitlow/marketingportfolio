                                        {currentPage === item.id && <div className="zoom-in absolute bottom-0 left-0 right-0 h-0.5 bg-blue-500 rounded-full" />}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow pt-24">
                        {currentPage === 'home' && <Home />}
                        {currentPage === 'case-studies' && <CaseStudies />}
                        {currentPage === 'strategy' && <Strategy />}
                        {currentPage === 'gallery' && <Gallery />}
                        {currentPage === 'about' && <About />}
                    </main>

                    <footer className="py-16 border-t border-white/5 px-6 text-center bg-[#01040f]">
                        <div className="flex flex-col items-center gap-6">
                            <div className="flex flex-col cursor-pointer" onClick={() => setCurrentPage('home')}>
                                <span className="font-black tracking-tighter text-2xl leading-none uppercase">NATHANIEL WHITLOW</span>
                                <span className="text-[10px] text-blue-500 font-bold tracking-[0.4em] uppercase mt-1">Portfolio 2026</span>
                            </div>
                            <p className="text-slate-600 text-[9px] font-black uppercase tracking-[0.4em] max-w-xs leading-relaxed">
                                Digital Content Management • Organic Growth Specialist • 100k+ Views
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
